name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
    # Запускаем анализ только если изменился код, конфигурации или сам этот файл
    paths:
      - '**.rs'
      - '**.py'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'requirements.txt'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.rs'
      - '**.py'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '34 7 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Используем ubuntu-latest, так как для Rust и Python этого достаточно, а ресурсы экономятся
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none
        - language: rust
          # ИЗМЕНЕНО: autobuild вместо none. CodeQL сам запустит cargo build для глубокого анализа
          build-mode: autobuild
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Раскомментируйте строку ниже, если захотите добавить расширенные проверки качества
        # queries: security-extended,security-and-quality

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
